[coverage:run]
source = .
omit = 
    */venv/*
    */__pycache__/*
    */.pytest_cache/*
    test_*.py
    tect/test_*.py
    setup.py
    run_tests.py
    performance_test_bge_service.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:

[coverage:html]
directory = coverage_report