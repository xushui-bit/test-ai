[coverage:run]
source = .
omit = 
    */venv/*
    */__pycache__/*
    */.pytest_cache/*
    tests/*
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:

[coverage:html]
directory = coverage_report