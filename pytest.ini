[tool:pytest]
testpaths = tect
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --cov=cherry_bge_service
    --cov-report=html:coverage_report
    --cov-report=term-missing
    --cov-config=setup.cfg

[coverage:run]
source = .
omit = 
    */venv/*
    */__pycache__/*
    */.pytest_cache/*
    test_*.py
    tect/test_*.py
    setup.py
    run_tests.py
    performance_test_bge_service.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.: